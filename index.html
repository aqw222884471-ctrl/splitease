<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SplitEase - 分帳</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --primary:#FFB6C1;
      --primary-dark:#FF8DA1;
      --bg:#FFF5F5;
      --card-bg:#FFFFFF;
      --text:#5D4E4E;
      --text-light:#A99A9A;
      --accent:#FF6B8A;
      --success:#7DD3C0;
      --warning:#FFD166;
      --danger:#FF6B6B;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);min-height:100vh;background-image:radial-gradient(circle at 0% 0%, #FFE4E8 0%, transparent 50%),radial-gradient(circle at 100% 100%, #FFE4E8 0%, transparent 50%)}
    .container{max-width:420px;margin:0 auto;padding:20px;padding-bottom:120px}
    .title{font-size:24px;font-weight:700;color:var(--text);margin-bottom:16px}
    .card{background:var(--card-bg);border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 4px 20px rgba(255,182,193,0.3);border:1px solid rgba(255,182,193,0.3)}
    .btn{width:100%;padding:16px;border:none;border-radius:16px;font-size:16px;font-weight:500;cursor:pointer;transition:all 0.2s}
    .btn:hover{transform:translateY(-2px)}
    .btn-main{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:380px;z-index:100;box-shadow:0 8px 24px rgba(255,141,161,0.4)}
    .btn-main:hover{box-shadow:0 12px 32px rgba(255,141,161,0.5)}
    .btn-sec{background:#FFF;font(---weight:500;color:var(--text);border:2px solid var(--primary)}
    .btn-sec:hover{background:var(--primary);color:white}
    .btn-danger{background:linear-gradient(135deg,var(--danger),#FF4757);color:white}
    .input{width:100%;padding:14px 16px;border:2px solid #FFE4E8;border-radius:14px;font-size:15px;background:#FFF;transition:all 0.2s;font-family:inherit}
    .input:focus{outline:none;border-color:var(--primary-dark);box-shadow:0 0 0 4px rgba(255,141,161,0.15)}
    .tag{display:inline-block;background:#FFF5F5;padding:10px 16px;border-radius:12px;margin:4px;font-size:14px;border:2px solid transparent;cursor:pointer;transition:all 0.2s;font-weight:500}
    .tag:hover{border-color:var(--primary)}
    .tag.active{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;box-shadow:0 4px 12px rgba(255,141,161,0.3)}
    .tag.checked{background:linear-gradient(135deg,var(--success),#5ED3B8);color:white;box-shadow:0 4px 12px rgba(125,211,192,0.3)}
    .item{padding:16px 0;border-bottom:1px solid #FFE4E8}
    .positive{color:var(--danger);font-weight:600}
    .negative{color:var(--success);font-weight:600}
    .label{font-size:13px;color:var(--text-light);margin-bottom:8px;font-weight:500;display:block}
    .money{font-size:26px;font-weight:700;color:var(--text)}
    .diff-alert{background:linear-gradient(135deg,#FFF9E6,#FFEDC2);border-radius:14px;padding:14px;margin:8px 0;border:1px solid var(--warning)}
    .flex{display:flex;flex-wrap:wrap}
    .flex-1{flex:1}
    .gap-2{gap:8px}
    .mt-2{margin-top:8px}
    .mb-2{margin-bottom:8px}
    .text-sm{font-size:13px}
    .text-xs{font-size:11px}
    .badge{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600}
    h1{font-size:28px;font-weight:700;text-align:center;margin:24px 0;color:var(--text)}
    .logo{font-size:32px;margin-bottom:8px}
    .stat-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed #FFE4E8}
    .stat-row:last-child{border-bottom:none}
    .total-row{font-weight:700;font-size:18px;padding-top:12px;border-top:2px solid var(--primary);margin-top:8px}
  </style>
</head>
<body>
  <div id="app" class="container"></div>
  <script>
    const uid=()=>Math.random().toString(36).substr(2,9);
    const load=k=>{try{return JSON.parse(localStorage.getItem('splitease_'+k))}catch{return null}};
    const save=(k,v)=>localStorage.setItem('splitease_'+k,JSON.stringify(v));
    
    let page='home', group=null, groupName='', newMemberName='', members=[], bills=[], mode='AA';
    let title='', amount='', payerId='', shares={}, sharedFee='', splitMembers=[];
    let editBillId=null, items=[]; 
    let servicePercent=0, discount=0, discountType='proportional';
    let totalPaid=0, feePerPerson=0;
    let inputState={};
    
    function getGroups(){return Object.keys(localStorage).filter(k=>k.startsWith('splitease_g_')).map(k=>load(k.replace('splitease_',''))).filter(g=>g).sort((a,b)=>b.updated-a.updated);}
    function getGroup(id){return load('g_'+id);}
    function saveGroup(g){save('g_'+g.id,g);}
    
    function render(){
      const app=document.getElementById('app');
      const groups=getGroups();
      
      if(page==='home'){
        app.innerHTML=`
          <div class="logo">🍽️</div>
          <h1>SplitEase</h1>
          ${groups.length?groups.map(g=>`
            <div class="card" style="cursor:pointer" onclick="openGroup('${g.id}')">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <span style="font-size:18px;font-weight:600;color:var(--text)">${g.name}</span>
                <span class="badge">${g.mode}</span>
              </div>
              <p class="text-sm" style="color:var(--text-light);margin-top:8px">${g.members.length}人 · NT$ ${g.bills.reduce((s,b)=>s+(Number(b.total)||0),0)}</p>
            </div>
          `).join(''):'<p style="text-align:center;color:var(--text-light);padding:40px">尚無群組</p>'}
          <button class="btn btn-main" onclick="page='new';render()">＋ 新增群組</button>
        `;
        return;
      }
      
      if(page==='new'){
        app.innerHTML=`
          <button class="text-sm" style="border:none;background:none;cursor:pointer;margin-bottom:16px;color:var(--text-light)" onclick="page='home';render()">← 返回</button>
          <h2 class="title">新增群組</h2>
          
          <label class="label">群組名稱</label>
          <input class="input" placeholder="例如：今晚聚餐" id="gname" value="${groupName}" onblur="groupName=this.value"/>
          
          <label class="label">分帳方式</label>
          <div class="flex gap-2 mb-2">
            <div class="card" style="cursor:pointer;text-align:center;flex:1;border:${mode==='AA'?'3px solid var(--primary-dark)':''}" onclick="mode='AA';render()">
              <div style="font-size:28px">✂️</div>
              <div style="font-weight:600;margin-top:4px">AA</div>
              <p class="text-xs" style="color:var(--text-light);margin-top:4px">多品項分攤</p>
            </div>
            <div class="card" style="cursor:pointer;text-align:center;flex:1;border:${mode==='AB'?'3px solid var(--primary-dark)':''}" onclick="mode='AB';render()">
              <div style="font-size:28px">📝</div>
              <div style="font-weight:600;margin-top:4px">AB</div>
              <p class="text-xs" style="color:var(--text-light);margin-top:4px">個人點餐</p>
            </div>
          </div>
          
          <label class="label">成員</label>
          <div class="flex gap-2 mb-2">
            <input class="input flex-1" placeholder="輸入名字" id="mname" value="${newMemberName}" onblur="newMemberName=this.value" style="margin:0"/>
            <button class="btn" style="width:50px;background:var(--primary);color:white" onclick="addMember()">+</button>
          </div>
          <div class="mb-2">${members.map(m=>`<span class="tag" onclick="removeMember('${m.id}')">${m.name} ✕</span>`).join('')}</div>
          
          <button class="btn btn-main" style="background:${groupName?'linear-gradient(135deg,var(--primary),var(--primary-dark))':'#DDD'}" onclick="createGroup()">建立群組</button>
        `;
        return;
      }
      
      if(page==='group'){
        const total=bills.reduce((s,b)=>s+(Number(b.total)||0),0);
        app.innerHTML=`
          <button class="text-sm" style="border:none;background:none;cursor:pointer;margin-bottom:16px;color:var(--text-light)" onclick="page='home';render()">← 返回</button>
          
          <div class="card" style="background:linear-gradient(135deg,${mode==='AA'?'#FFF0F3':'#E8F9F5'},${mode==='AA'?'#FFE4E8':'#D4F1E8'});border-left:4px solid ${mode==='AA'?'var(--primary-dark)':'var(--success)'}">
            <div style="font-size:22px;font-weight:700;color:var(--text)">${group.name}</div>
            <p class="text-sm" style="color:var(--text-light)">${members.length}人 · ${mode}</p>
          </div>
          
          <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
              <span style="font-weight:600;color:var(--text)">消費紀錄</span>
              <span class="money">NT$ ${total}</span>
            </div>
            ${!bills.length?'<p style="color:var(--text-light);text-align:center;padding:20px">尚無消費</p>':
            bills.slice().reverse().map(b=>`
              <div class="item" style="cursor:pointer" onclick="editBill('${b.id}')">
                <div style="display:flex;justify-content:space-between">
                  <span style="font-weight:500">${b.title}</span>
                  <span style="font-weight:700;color:var(--text)">${Number(b.total)||0}</span>
                </div>
                <p class="text-xs" style="color:var(--text-light)">${b.payerName} 付 · ${new Date(b.created).toLocaleDateString()}</p>
              </div>
            `).join('')}
          </div>
          
          <button class="btn btn-main" onclick="page='add';items=[];title='';amount='';totalPaid=0;feePerPerson=0;payerId=members[0]?.id;splitMembers=members.map(m=>m.id);servicePercent=0;sharedFee='';discount=0;editBillId=null;render()">＋ 新增消費</button>
          <button class="btn btn-sec mt-2" onclick="page='settlement';render()">📊 結算</button>
        `;
        return;
      }
      
      if(page==='add' && mode==='AA'){
        const itemsTotal=items.reduce((s,i)=>s+(Number(i.amount)||0),0);
        const serviceFee=Math.round(itemsTotal*(servicePercent/100));
        const grandTotal=itemsTotal+serviceFee+(Number(sharedFee)||0);
        
        let itemInputs='';
        items.forEach((it,idx)=>{
          const nameVal=inputState['item_name_'+idx]!==undefined?inputState['item_name_'+idx]:it.name;
          const amtVal=inputState['item_amt_'+idx]!==undefined?inputState['item_amt_'+idx]:it.amount;
          itemInputs+=`
            <div class="flex gap-2 mb-2" style="align-items:center">
              <input class="input flex-1" placeholder="品項名稱" data-idx="${idx}" data-key="item_name" value="${nameVal}" style="margin:0"/>
              <input type="number" class="input" placeholder="0" data-idx="${idx}" data-key="item_amt" value="${amtVal}" style="width:80px;margin:0"/>
              <button class="btn" style="width:40px;padding:8px;background:#FFE4E8;color:var(--danger)" onclick="items.splice(${idx},1);render()">×</button>
            </div>
          `;
        });
        
        app.innerHTML=`
          <button class="text-sm" style="border:none;background:none;cursor:pointer;margin-bottom:16px;color:var(--text-light)" onclick="page='group';render()">← 返回</button>
          <h2 class="title">新增消費 - AA</h2>
          
          <label class="label">品項列表</label>
          ${itemInputs}
          <button class="btn btn-sec mb-2" onclick="items.push({name:'',amount:''});render()">＋ 加品項</button>
          
          <label class="label">服務費 (%)</label>
          <input type="number" class="input" placeholder="0" id="servicePercent" value="${servicePercent}"/>
          
          <label class="label">額外費用（外送費等）</label>
          <input type="number" class="input" placeholder="0" id="sharedFee" value="${sharedFee}"/>
          
          <div class="card" style="background:linear-gradient(135deg,#FFF9FA,#FFF0F3)">
            <div class="stat-row"><span>品項小計</span><span>NT$ ${itemsTotal}</span></div>
            <div class="stat-row"><span>服務費(${servicePercent}%)</span><span>NT$ ${serviceFee}</span></div>
            <div class="stat-row"><span>額外費用</span><span>NT$ ${Number(sharedFee)||0}</span></div>
            <div class="stat-row total-row"><span>總計</span><span>NT$ ${grandTotal}</span></div>
          </div>
          
          <label class="label" style="margin-top:16px">誰付錢？</label>
          <div class="flex gap-2" style="flex-wrap:wrap">${members.map(m=>`<span class="tag ${payerId===m.id?'active':''}" onclick="payerId='${m.id}';render()">${m.name}</span>`).join('')}</div>
          
          <label class="label" style="margin-top:16px">誰分攤？</label>
          <div class="flex gap-2" style="flex-wrap:wrap">${members.map(m=>`<span class="tag ${splitMembers.includes(m.id)?'checked':''}" onclick="toggleSplit('${m.id}')">${m.name}</span>`).join('')}</div>
          
          <button class="btn btn-main" onclick="saveBillAA()">儲存消費</button>
        `;
        
        setTimeout(()=>{
          document.querySelectorAll('.input').forEach(el=>{
            el.addEventListener('input',e=>{
              const key=e.target.dataset.key;
              const idx=e.target.dataset.idx;
              if(key && idx!==undefined){
                inputState[key+'_'+idx]=e.target.value;
              }else if(e.target.id==='servicePercent'){
                servicePercent=Number(e.target.value)||0;
              }else if(e.target.id==='sharedFee'){
                sharedFee=e.target.value;
              }
              updateAAStats();
            });
          });
        },0);
        return;
      }
      
      if(page==='add' && mode==='AB'){
        let personalSum=0;
        members.forEach(m=>{
          personalSum+=Number(shares[m.id]||0);
        });
        
        const totalBill=Number(totalPaid)||0;
        let diff=totalBill - personalSum;
        
        if(diff!==0 && members.length>0){
          feePerPerson=Math.round(diff/members.length*100)/100;
        }else{
          feePerPerson=0;
        }
        
        const grandTotal=personalSum + (feePerPerson * members.length);
        
        app.innerHTML=`
          <button class="text-sm" style="border:none;background:none;cursor:pointer;margin-bottom:16px;color:var(--text-light)" onclick="page='group';render()">← 返回</button>
          <h2 class="title">新增消費 - AB</h2>
          
          <label class="label">💳 實際刷卡總額</label>
          <input type="number" class="input" placeholder="0" id="totalPaid" value="${totalPaid}"/>
          
          <label class="label">🍜 個人餐點金額</label>
          ${members.map(m=>`
            <div class="flex gap-2 mb-2" style="align-items:center">
              <span style="flex:1;font-weight:500">${m.name}</span>
              <input type="number" class="input" placeholder="0" data-mid="${m.id}" value="${shares[m.id]||''}" style="width:100px;margin:0"/>
            </div>
          `).join('')}
          
          <div class="card" style="background:linear-gradient(135deg,#FFF9FA,#FFF0F3)" id="abStats">
            <div class="stat-row"><span>個人餐點總和</span><span>NT$ ${personalSum}</span></div>
            <div class="stat-row"><span>實際刷卡總額</span><span>NT$ ${totalBill}</span></div>
            <div class="stat-row total-row">
              <span>差額（服務費）</span>
              <span style="color:${diff>0?'var(--success)':diff<0?'var(--danger)':'var(--text)'}">${diff>0?'+':''}${diff.toFixed(0)}</span>
            </div>
            <div class="stat-row"><span>每人平均</span><span style="color:var(--accent)">NT$ ${feePerPerson.toFixed(0)}</span></div>
            <div class="stat-row total-row"><span>總計</span><span>NT$ ${grandTotal.toFixed(0)}</span></div>
          </div>
          
          <button class="btn btn-main" onclick="saveBillAB()">儲存消費</button>
        `;
        
        setTimeout(()=>{
          document.querySelectorAll('.input').forEach(el=>{
            el.addEventListener('input',e=>{
              if(e.target.id==='totalPaid'){
                totalPaid=Number(e.target.value)||0;
              }else if(e.target.dataset.mid){
                shares[e.target.dataset.mid]=e.target.value;
              }
              updateABStats();
            });
          });
        },0);
        return;
      }
      
      if(page==='settlement'){
        const balances={};
        members.forEach(m=>balances[m.id]=0);
        
        bills.forEach(b=>{
          if(mode==='AA'){
            const list=b.splitMembers||members.map(m=>m.id);
            const each=Number(b.total)/list.length;
            if(b.payerId){
              balances[b.payerId]+=Number(b.total);
              list.forEach(mid=>{if(mid!==b.payerId)balances[mid]-=each;});
            }
          }else{
            if(b.shares){
              Object.entries(b.shares).forEach(([mid,amt])=>{
                balances[mid]=(balances[mid]||0)+Number(amt);
              });
            }
          }
        });
        
        const total=bills.reduce((s,b)=>s+(Number(b.total)||0),0);
        const debtors=[], creditors=[];
        members.forEach(m=>{
          const bal=balances[m.id]||0;
          if(bal<-0.01)debtors.push({id:m.id,name:m.name,amount:-bal});
          if(bal>0.01)creditors.push({id:m.id,name:m.name,amount:bal});
        });
        
        app.innerHTML=`
          <button class="text-sm" style="border:none;background:none;cursor:pointer;margin-bottom:16px;color:var(--text-light)" onclick="page='group';render()">← 返回</button>
          <h2 class="title">結算</h2>
          
          <div class="card" style="text-align:center;background:linear-gradient(135deg,#FFF0F3,#FFE4E8)">
            <p style="color:var(--text-light)">總金額</p>
            <p class="money">NT$ ${total}</p>
          </div>
          
          <div class="card">
            ${members.map(m=>{
              const amt=balances[m.id]||0;
              return `<div style="display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid #FFE4E8">
                <span style="font-weight:600">${m.name}</span>
                <span class="${amt>0?'positive':amt<0?'negative':''}">${amt>0?'+':''}${amt.toFixed(0)}</span>
              </div>`;
            })}
          </div>
          
          ${debtors.length && creditors.length?`
            <div class="card" style="background:linear-gradient(135deg,#E8F9F5,#D4F1E8)">
              <p style="font-weight:600;margin-bottom:12px">💰 還款路徑</p>
              ${debtors.map(d=>{
                let remaining=d.amount;
                return creditors.filter(c=>c.amount>0).map(c=>{
                  if(remaining<=0)return'';
                  const give=Math.min(remaining,c.amount);
                  remaining-=give;
                  c.amount-=give;
                  return `<div style="padding:10px 0;border-bottom:1px dashed #D4F1E8">
                    <span style="font-weight:600">${d.name}</span> 給 <span style="font-weight:600">${c.name}</span> 
                    <span style="color:var(--success);font-weight:700">NT$ ${give.toFixed(0)}</span>
                  </div>`;
                }).join('');
              }).join('')}
            </div>
          `:''}
          
          <button class="btn btn-danger mt-2" onclick="settle()">💚 一鍵結清</button>
          <button class="btn btn-sec mt-2" onclick="copyResult()">📋 複製結算內容</button>
          <button class="btn btn-sec mt-2" onclick="exportJSON()">💾 匯出資料</button>
        `;
        return;
      }
    }
    
    function updateAAStats(){
      const sp=document.getElementById('servicePercent');
      const sf=document.getElementById('sharedFee');
      if(sp)servicePercent=Number(sp.value)||0;
      if(sf)sharedFee=sf.value;
      
      document.querySelectorAll('[data-key="item_name"]').forEach(el=>{
        const idx=el.dataset.idx;
        if(items[idx])items[idx].name=el.value;
      });
      document.querySelectorAll('[data-key="item_amt"]').forEach(el=>{
        const idx=el.dataset.idx;
        if(items[idx])items[idx].amount=el.value;
      });
      
      const itemsTotal=items.reduce((s,i)=>s+(Number(i.amount)||0),0);
      const serviceFee=Math.round(itemsTotal*(servicePercent/100));
      const grandTotal=itemsTotal+serviceFee+(Number(sharedFee)||0);
      
      const statsEl=document.querySelector('.card[style*="background"]');
      if(statsEl && page==='add' && mode==='AA'){
        statsEl.innerHTML=`
          <div class="stat-row"><span>品項小計</span><span>NT$ ${itemsTotal}</span></div>
          <div class="stat-row"><span>服務費(${servicePercent}%)</span><span>NT$ ${serviceFee}</span></div>
          <div class="stat-row"><span>額外費用</span><span>NT$ ${Number(sharedFee)||0}</span></div>
          <div class="stat-row total-row"><span>總計</span><span>NT$ ${grandTotal}</span></div>
        `;
      }
    }
    
    function updateABStats(){
      const tp=document.getElementById('totalPaid');
      if(tp)totalPaid=Number(tp.value)||0;
      
      document.querySelectorAll('[data-mid]').forEach(el=>{
        shares[el.dataset.mid]=el.value;
      });
      
      let personalSum=0;
      members.forEach(m=>{
        personalSum+=Number(shares[m.id]||0);
      });
      
      const totalBill=totalPaid;
      let diff=totalBill - personalSum;
      
      if(diff!==0 && members.length>0){
        feePerPerson=Math.round(diff/members.length*100)/100;
      }else{
        feePerPerson=0;
      }
      
      const grandTotal=personalSum + (feePerPerson * members.length);
      
      const statsEl=document.getElementById('abStats');
      if(statsEl){
        statsEl.innerHTML=`
          <div class="stat-row"><span>個人餐點總和</span><span>NT$ ${personalSum}</span></div>
          <div class="stat-row"><span>實際刷卡總額</span><span>NT$ ${totalBill}</span></div>
          <div class="stat-row total-row">
            <span>差額（服務費）</span>
            <span style="color:${diff>0?'var(--success)':diff<0?'var(--danger)':'var(--text)'}">${diff>0?'+':''}${diff.toFixed(0)}</span>
          </div>
          <div class="stat-row"><span>每人平均</span><span style="color:var(--accent)">NT$ ${feePerPerson.toFixed(0)}</span></div>
          <div class="stat-row total-row"><span>總計</span><span>NT$ ${grandTotal.toFixed(0)}</span></div>
        `;
      }
    }
    
    function addMember(){
      const input=document.getElementById('mname');
      const name=input?input.value:newMemberName;
      if(!name)return;
      members.push({id:uid(),name});
      newMemberName='';
      render();
    }
    function removeMember(id){members=members.filter(m=>m.id!==id);render();}
    function toggleSplit(id){splitMembers=splitMembers.includes(id)?splitMembers.filter(x=>x!==id):[...splitMembers,id];render();}
    
    function createGroup(){if(!groupName)return;const g={id:uid(),name:groupName,mode,members,bills:[],created:Date.now(),updated:Date.now()};saveGroup(g);group=g;page='group';render();}
    function openGroup(id){group=getGroup(id);if(!group)return;members=group.members;bills=group.bills;mode=group.mode;page='group';render();}
    
    function saveBillAA(){
      updateAAStats();
      if(!items.length || !payerId)return;
      
      const itemsTotal=items.reduce((s,i)=>s+(Number(i.amount)||0),0);
      const serviceFee=Math.round(itemsTotal*(servicePercent/100));
      const shared=Number(sharedFee)||0;
      const total=itemsTotal+serviceFee+shared;
      
      const bill={
        id:editBillId||uid(),
        title:items.map(i=>i.name).join('、'),
        items:[...items],
        servicePercent,
        sharedFee:shared,
        total,
        payerId,
        payerName:members.find(m=>m.id===payerId)?.name||'?',
        splitMembers:[...splitMembers],
        created:Date.now()
      };
      
      if(editBillId){
        const idx=bills.findIndex(b=>b.id===editBillId);
        if(idx>=0)bills[idx]=bill;
      }else{
        bills.push(bill);
      }
      
      group.bills=bills;group.updated=Date.now();saveGroup(group);
      inputState={};resetAdd();page='group';render();
    }
    
    function saveBillAB(){
      updateABStats();
      if(!totalPaid || !payerId)return;
      
      let personalSum=0;
      members.forEach(m=>{
        personalSum+=Number(shares[m.id]||0);
      });
      
      const totalBill=Number(totalPaid);
      
      let finalShares={};
      members.forEach(m=>{
        const personal=Number(shares[m.id]||0);
        finalShares[m.id]=personal + feePerPerson;
      });
      
      const bill={
        id:editBillId||uid(),
        title:`總額 ${totalBill}`,
        totalPaid:totalBill,
        personalSum:personalSum,
        feePerPerson:feePerPerson,
        total:totalBill,
        payerId,
        payerName:members.find(m=>m.id===payerId)?.name||'?',
        shares:finalShares,
        created:Date.now()
      };
      
      if(editBillId){
        const idx=bills.findIndex(b=>b.id===editBillId);
        if(idx>=0)bills[idx]=bill;
      }else{
        bills.push(bill);
      }
      
      group.bills=bills;group.updated=Date.now();saveGroup(group);
      inputState={};resetAdd();page='group';render();
    }
    
    function resetAdd(){title='';amount='';totalPaid=0;feePerPerson=0;payerId='';shares={};sharedFee='';splitMembers=[];servicePercent=0;discount=0;editBillId=null;items=[];}
    
    function editBill(id){
      const bill=bills.find(b=>b.id===id);
      if(!bill)return;
      editBillId=id;
      
      if(mode==='AA'){
        items=bill.items?bill.items.map(i=>({name:i.name,amount:i.amount})):[{name:bill.title,amount:bill.total}];
        servicePercent=bill.servicePercent||0;
        sharedFee=bill.sharedFee||'';
        payerId=bill.payerId;
        splitMembers=bill.splitMembers||members.map(m=>m.id);
      }else{
        totalPaid=bill.totalPaid||0;
        if(bill.shares && bill.feePerPerson!==undefined){
          shares={};
          members.forEach(m=>{
            shares[m.id]=Number(bill.shares[m.id]||0) - bill.feePerPerson;
          });
        }else{
          shares=bill.shares||{};
        }
        feePerPerson=bill.feePerPerson||0;
        payerId=bill.payerId;
      }
      
      page='add';render();
    }
    
    function settle(){
      if(!confirm('確定結清？會清除所有消費紀錄'))return;
      bills=[];
      group.bills=[];group.updated=Date.now();saveGroup(group);
      page='group';render();
    }
    
    function copyResult(){
      const total=bills.reduce((s,b)=>s+(Number(b.total)||0),0);
      const balances={};
      members.forEach(m=>balances[m.id]=0);
      
      bills.forEach(b=>{
        if(mode==='AA'){
          const list=b.splitMembers||members.map(m=>m.id);
          const each=Number(b.total)/list.length;
          if(b.payerId){balances[b.payerId]+=Number(b.total);list.forEach(mid=>{if(mid!==b.payerId)balances[mid]-=each;});}
        }else{
          if(b.shares)Object.entries(b.shares).forEach(([mid,amt])=>balances[mid]=(balances[mid]||0)+Number(amt));
        }
      });
      
      let text=`🍽️ ${group.name} 結算\n`;
      text+=`總金額：NT$ ${total}\n\n`;
      
      if(mode==='AB'){
        bills.forEach(b=>{
          if(b.feePerPerson!==undefined){
            text+=`\n📝 單筆消費：NT$ ${b.total}\n`;
            if(b.shares){
              Object.entries(b.shares).forEach(([mid,amt])=>{
                const m=members.find(x=>x.id===mid);
                if(m){
                  const personal=Number(amt)-b.feePerPerson;
                  text+=`  • ${m.name}：餐點 NT$ ${personal} + 服務費 NT$ ${b.feePerPerson} = NT$ ${Number(amt).toFixed(0)}\n`;
                }
              });
            }
          }
        });
        text+='\n';
      }
      
      members.forEach(m=>{
        const amt=balances[m.id]||0;
        if(amt>0)text+=`${m.name} 應付：NT$ ${amt.toFixed(0)}\n`;
        if(amt<0)text+=`${m.name} 應收：NT$ ${Math.abs(amt).toFixed(0)}\n`;
      });
      
      navigator.clipboard.writeText(text);
      alert('✅ 已複製到剪貼簿');
    }
    
    function exportJSON(){
      const data={group:{...group},members,bills};
      const json=JSON.stringify(data,null,2);
      navigator.clipboard.writeText(json);
      alert('✅ JSON 已複製到剪貼簿');
    }
    
    render();
  </script>
</body>
</html>
