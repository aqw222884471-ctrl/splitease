<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SplitEase - 晚餐分帳</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">
  <div id="app" class="max-w-md mx-auto p-4"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script type="text/babel">
    const {useState,useEffect}=React;
    const API='';
    const db={projects:{},parts:{},exps:{}};
    const uid=()=>Math.random().toString(36).substr(2,9);
    const code=()=>Math.random().toString(36).substr(2,6).toUpperCase();
    const api={
      c:(n,m,u)=>{const p={id:uid(),code:code(),name:n,mode:m,bal:{},t:new Date()};
        const h={id:uid(),name:u,host:true};
        db.projects[p.id]=p;db.parts[p.id]=[h];db.exps[p.id]=[];
        localStorage.setItem('pid',p.id);localStorage.setItem('uid',h.id);
        return Promise.resolve(p)},
      j:(c,u)=>{const p=Object.values(db.projects).find(x=>x.code===c);
        if(!p)return Promise.reject('no');const x={id:uid(),name:u,host:false};
        db.parts[p.id].push(x);localStorage.setItem('pid',p.id);localStorage.setItem('uid',x.id);
        return Promise.resolve(p)},
      gp:()=>db.parts[localStorage.getItem('pid')]||[],
      ge:()=>db.exps[localStorage.getItem('pid')]||[],
      ad:(df,it)=>{const pid=localStorage.getItem('pid');const p=db.projects[pid];
        const pts=db.parts[pid];const per=(parseFloat(df)||0)/(pts.length||1);
        const ex={id:uid(),items:it.map(i=>({pid:i.pid,amt:parseFloat(i.a),total:parseFloat(i.a)+per})),t:new Date()};
        it.forEach(i=>{const id=i.pid;p.bal[id]=(p.bal[id]||0)+parseFloat(i.a)+per});
        db.exps[pid].push(ex);return Promise.resolve(ex)},
      gb:()=>{const pid=localStorage.getItem('pid');const p=db.projects[pid];
        return Promise.resolve({b:Object.entries(p.bal).map(([id,amt])=>{
          const pt=db.parts[pid].find(x=>x.id===id);
          return{pid:id,name:pt.name,host:pt.host,amt:amt}
        }),tot:db.exps[pid].reduce((s,e)=>s+e.items.reduce((a,i)=>a+i.total,0),0)})},
      st:()=>{const pid=localStorage.getItem('pid');db.projects[pid].bal={};db.exps[pid]=[];return Promise.resolve({ok:1})}
    };
    function Home(){return(<div className="text-center py-8"><h1 className="text-4xl font-bold text-orange-500 mb-2">🍜</h1><h2 className="text-2xl font-bold text-indigo-600 mb-6">SplitEase</h2><button onClick={()=>n('c')} className="block w-full bg-orange-500 text-white py-3 rounded-lg font-bold mb-3">建立新專案</button><button onClick={()=>n('j')} className="block w-full bg-gray-200 py-3 rounded-lg font-bold">加入專案</button></div>);}
    function Create({done}){const[m,setM]=useState('dinner');const[nm,setNm]=useState('');const[un,setUn]=useState('');const[load,setL]=useState(false);const[ok,setOk]=useState(null);
      const go=async e=>{e.preventDefault();if(!nm||!un)return;setL(true);const p=await api.c(nm,m,un);setOk(p);setL(false);}
      if(ok)return(<div className="text-center"><h2 className="text-xl font-bold text-green-600 mb-4">✅ 成功</h2><div className="bg-gray-100 p-4 rounded mb-4"><p className="text-gray-500 text-sm">邀請碼</p><p className="text-3xl font-bold">{ok.code}</p></div><button onClick={()=>n(ok.id)} className="block w-full bg-indigo-600 text-white py-3 rounded-lg font-bold">進入 →</button></div>);
      return(<form onSubmit={go}><div className="grid grid-cols-2 gap-2 mb-4"><button type="button" onClick={()=>setM('dinner')} className={`p-4 rounded-xl border-2 ${m==='dinner'?'border-orange-500 bg-orange-50':'border-gray-200'}`}><span className="text-2xl">🍜</span><br/><span className="font-bold">晚餐</span></button><button type="button" onClick={()=>setM('full')} className={`p-4 rounded-xl border-2 ${m==='full'?'border-indigo-500 bg-indigo-50':'border-gray-200'}`}><span className="text-2xl">📊</span><br/><span className="font-bold">完整</span></button></div><input value={nm} onChange={e=>setNm(e.target.value)} placeholder="專案名稱" className="w-full p-3 border rounded mb-3"/><input value={un} onChange={e=>setUn(e.target.value)} placeholder="你的暱稱" className="w-full p-3 border rounded mb-3"/><button disabled={load||!nm||!un} className="block w-full bg-orange-500 text-white py-3 rounded-lg font-bold">{load?'處理中':'建立專案'}</button></form>);}
    function Join(){const[c,setC]=useState('');const[u,setU]=useState('');const[l,setL]=useState(false);
      const go=async e=>{e.preventDefault();if(!c||!u)return;setL(true);try{await api.j(c.toUpperCase(),u);n(localStorage.getItem('pid'));}catch{alert('邀請碼錯誤');}setL(false);}
      return(<form onSubmit={go}><input value={c} onChange={e=>setC(e.target.value.toUpperCase())} placeholder="輸入6位數邀請碼" className="w-full p-3 border rounded mb-3 text-center text-xl tracking-widest"/><input value={u} onChange={e=>setU(e.target.value)} placeholder="你的暱稱" className="w-full p-3 border rounded mb-3"/><button disabled={l} className="block w-full bg-indigo-600 text-white py-3 rounded-lg font-bold">{l?'處理中':'加入'}</button></form>);}
    function Dashboard(){const[pts,setPts]=useState([]);const[exs,setExs]=useState([]);const[bal,setBal]=useState(null);const uid=localStorage.getItem('uid');const pid=localStorage.getItem('pid');
      useEffect(()=>{setPts(api.gp());setExs(api.ge());api.gb().then(setBal);},[]);
      const owe=bal?.b.find(x=>x.pid===uid)?.amt||0;
      return(<div><div className="bg-orange-500 text-white p-4 rounded mb-4"><p className="text-sm opacity-80">你的欠款</p><p className="text-3xl font-bold">NT$ {owe}</p></div><div className="flex gap-2 mb-4"><button onClick={()=>n(pid+'/d')} className="flex-1 bg-orange-500 text-white py-3 rounded font-bold">🍜 新增點單</button><button onClick={()=>n(pid+'/b')} className="flex-1 bg-gray-200 py-3 rounded font-bold">📋 欠款</button></div><div className="bg-white p-4 rounded shadow"><h3 className="font-bold text-gray-600 mb-2">點單記錄</h3>{exs.length===0?<p className="text-gray-400 text-center py-4">尚無記錄</p>:exs.map(e=><div key={e.id} className="border-b py-2"><p className="text-sm text-gray-500">{e.t.toLocaleString()}</p><p className="font-bold">NT$ {e.items.reduce((s,i)=>s+i.total,0)}</p></div>)}</div></div>);}
    function AddDinner(){const[pts,setPts]=useState([]);const[df,setDf]=useState('');const[its,setIts]={};const[l,setL]=useState(false);const pid=localStorage.getItem('pid');
      useEffect(()=>{const p=api.gp();setPts(p);p.forEach(x=>its[x.id]='');setIts({...its});},[]);
      const go=async e=>{e.preventDefault();const arr=Object.entries(its).filter(([k,v])=>v).map(([k,v])=>({pid:k,a:parseFloat(v)||0})).filter(x=>x.a>0);
        if(arr.length===0)return alert('請輸入金額');setL(true);await api.ad(df,arr);alert('✅ 已記錄');n(pid);setL(false);}
      const per=(parseFloat(df)||0)/(pts.length||1);
      return(<form onSubmit={go}><div className="bg-white p-4 rounded mb-4"><label className="block font-bold mb-2">🚴 外送費（均分）</label><input type="number" value={df} onChange={e=>setDf(e.target.value)} className="w-full p-3 border rounded"/><p className="text-sm text-gray-500 mt-1">NT$ {per}/人</p></div><div className="bg-white p-4 rounded mb-4"><label className="block font-bold mb-2">🍽️ 點餐金額</label>{pts.map(p=><div key={p.id} className="flex items-center mb-3"><span className="flex-1 font-medium">{p.name} {p.host&&'👑'}</span><input type="number" value={its[p.id]} onChange={e=>{its[p.id]=e.target.value;setIts({...its});}} className="w-28 p-2 border rounded text-right" placeholder="0"/></div>)}</div><button disabled={l} className="block w-full bg-orange-500 text-white py-3 rounded-lg font-bold">{l?'儲存中':'✅ 確認記錄'}</button></form>);}
    function Balance(){const[b,setB]=useState(null);const[l,setL]=useState(true);const uid=localStorage.getItem('uid');
      useEffect(()=>{api.gb().then(x=>{setB(x);setL(false);});},[]);
      const go=async()=>{if(!confirm('確定結清？會清除所有記錄'))return;setL(true);await api.st();alert('✅ 已結清');n(localStorage.getItem('pid'));}
      if(l)return(<div className="text-center py-8">載入中...</div>);
      const host=b?.b.find(x=>x.host);const mems=b?.b.filter(x=>!x.host)||[];
      return(<div><div className="bg-orange-50 p-4 rounded mb-4"><p className="text-orange-600 text-sm">累積總消費</p><p className="text-2xl font-bold text-orange-600">NT$ {b.tot}</p></div><div className="bg-white p-4 rounded mb-4">{host&&<div className="flex justify-between py-2 border-b"><span className="font-medium">{host.name} 👑</span><span className="text-green-600">+NT$ {host.amt}</span></div>}{mems.map(m=><div key={m.pid} className={`flex justify-between py-2 ${m.amt>0?'bg-red-50 -mx-2 px-2 rounded':''}`}><span className={m.pid===uid?'text-orange-600 font-bold':''}>{m.name} {m.pid===uid&&'(你)'}</span><span className={m.amt>0?'text-red-600':'text-gray-400'}>NT$ {m.amt>0?'-':''}{m.amt}</span></div>)}</div><button onClick={go} className="block w-full bg-green-500 text-white py-3 rounded-lg font-bold">💚 一鍵結清</button></div>);}
    let cur='';
    const n=(p)=>{cur=p;r();};
    function App(){const pid=localStorage.getItem('pid');if(!pid&&!cur)return<Home/>;if(cur==='c')return<Create done={n}/>;if(cur==='join')return<Join/>;if(cur&&!cur.startsWith('/'))return<Dashboard/>;if(cur){const id=cur.split('/')[0];if(cur.includes('/d'))return<AddDinner/>;if(cur.includes('/b'))return<Balance/>;return<Dashboard/>;}return<Home/>;}
    function r(){ReactDOM.render(<App/>,document.getElementById('app'));}
    r();
  </script>
</body>
</html>
