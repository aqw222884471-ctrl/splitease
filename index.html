<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SplitEase - 分帳</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f8fafc;min-height:100vh;background-image:radial-gradient(circle at 20% 20%, #fef3c7 0%, transparent 50%),radial-gradient(circle at 80% 80%, #fef3c7 0%, transparent 50%);background-color:#fafaf9}
    .container{max-width:480px;margin:0 auto;padding:20px;padding-bottom:120px}
    .title{font-size:28px;font-weight:700;color:#1e293b}
    .card{background:#fff;border-radius:24px;padding:20px;margin-bottom:16px;box-shadow:4px 4px 0 #1e293b;border:2px solid #1e293b}
    .btn{width:100%;padding:16px;border:none;border-radius:16px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:3px 3px 0 #1e293b;border:2px solid #1e293b}
    .btn-main{background:#fbbf24;color:#1e293b;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:440px;z-index:100}
    .btn-sec{background:#fff;color:#1e293b}
    .btn-danger{background:#ef4444;color:#fff}
    .input{width:100%;padding:14px;border:2px solid #1e293b;border-radius:12px;font-size:16px;background:#fff}
    .input:focus{outline:none;box-shadow:2px 2px 0 #1e293b}
    .tag{display:inline-block;background:#fef3c7;padding:10px 14px;border-radius:12px;margin:4px;font-size:14px;border:2px solid #1e293b;cursor:pointer;box-shadow:2px 2px 0 #1e293b}
    .tag.active{background:#fbbf24}
    .tag.checked{background:#22c55e;color:#fff}
    .item{border-bottom:1px solid #e5e7eb;padding:12px 0}
    .positive{color:#ef4444;font-weight:700}
    .negative{color:#22c55e;font-weight:700}
    .label{font-size:14px;color:#64748b;margin-bottom:6px;font-weight:600;display:block}
    .money{font-size:28px;font-weight:700;color:#1e293b}
    .diff-alert{background:#fef9c3;border:2px solid #eab308;border-radius:12px;padding:12px;margin:8px 0}
    .flex{display:flex;flex-wrap:wrap}
    .flex-1{flex:1}
    .gap-2{gap:8px}
    .mt-2{margin-top:8px}
    .mb-2{margin-bottom:8px}
    .text-sm{font-size:14px}
    .text-xs{font-size:12px}
    .badge{background:#fbbf24;padding:4px 8px;border-radius:8px;font-size:12px;font-weight:700}
    h1{font-size:32px;font-weight:800;text-align:center;margin:20px 0}
  </style>
</head>
<body>
  <div id="app" class="container"></div>
  <script>
    // ===== 工具函式 =====
    const uid=()=>Math.random().toString(36).substr(2,9);
    const load=k=>{try{return JSON.parse(localStorage.getItem('splitease_'+k))}catch{return null}};
    const save=(k,v)=>localStorage.setItem('splitease_'+k,JSON.stringify(v));
    
    // ===== 全域狀態 =====
    let page='home', group=null, groupName='', newMemberName='', members=[], bills=[], mode='AA';
    let title='', amount='', payerId='', shares={}, sharedFee='', splitMembers=[];
    let editBillId=null, items=[]; // AA模式用
    
    // AA模式：服務費百分比
    let servicePercent=0;
    
    // AB模式：折扣
    let discount=0, discountType='proportional'; // proportional or average
    
    function getGroups(){return Object.keys(localStorage).filter(k=>k.startsWith('splitease_g_')).map(k=>load(k.replace('splitease_',''))).filter(g=>g).sort((a,b)=>b.updated-a.updated);}
    function getGroup(id){return load('g_'+id);}
    function saveGroup(g){save('g_'+g.id,g);}
    
    // ===== 渲染 =====
    function render(){
      const app=document.getElementById('app');
      const groups=getGroups();
      
      // ===== 首頁 =====
      if(page==='home'){
        app.innerHTML=`
          <h1>🍽️ SplitEase</h1>
          ${groups.length?groups.map(g=>`
            <div class="card" style="cursor:pointer" onclick="openGroup('${g.id}')">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <span style="font-size:20px;font-weight:700">${g.name}</span>
                <span class="badge">${g.mode}</span>
              </div>
              <p class="text-sm" style="color:#64748b;margin-top:8px">${g.members.length}人 · NT$ ${g.bills.reduce((s,b)=>s+b.total,0)}</p>
            </div>
          `).join(''):'<p style="text-align:center;color:#64748b;padding:40px">尚無群組</p>'}
          <button class="btn btn-main" onclick="page='new';render()">＋ 新增群組</button>
        `;
        return;
      }
      
      // ===== 新增群組 =====
      if(page==='new'){
        app.innerHTML=`
          <button class="text-sm" style="border:none;background:none;cursor:pointer;margin-bottom:16px" onclick="page='home';render()">← 返回</button>
          <h2 class="title">新增群組</h2>
          
          <label class="label">群組名稱</label>
          <input class="input" placeholder="例如：今晚聚餐" id="gname" value="${groupName}" oninput="groupName=this.value;render()"/>
          
          <label class="label">分帳方式</label>
          <div class="flex gap-2 mb-2">
            <div class="card" style="cursor:pointer;text-align:center;flex:1;border:${mode==='AA'?'3px solid #fbbf24':''}" onclick="mode='AA';render()">
              <div style="font-size:24px">✂️</div><div style="font-weight:700">AA</div>
            </div>
            <div class="card" style="cursor:pointer;text-align:center;flex:1;border:${mode==='AB'?'3px solid #fbbf24':''}" onclick="mode='AB';render()">
              <div style="font-size:24px">📝</div><div style="font-weight:700">AB</div>
            </div>
          </div>
          
          <label class="label">成員</label>
          <div class="flex gap-2 mb-2">
            <input class="input flex-1" placeholder="輸入名字" id="mname" value="${newMemberName}" oninput="newMemberName=this.value" style="margin:0"/>
            <button class="btn" style="width:50px;background:#fef3c7" onclick="addMember()">+</button>
          </div>
          <div class="mb-2">${members.map(m=>`<span class="tag" onclick="removeMember('${m.id}')">${m.name} ×</span>`).join('')}</div>
          
          <button class="btn btn-main" style="background:${groupName?'#fbbf24':'#d1d5db'}" onclick="createGroup()">建立群組</button>
        `;
        return;
      }
      
      // ===== 群組詳情 =====
      if(page==='group'){
        const total=bills.reduce((s,b)=>s+b.total,0);
        app.innerHTML=`
          <button class="text-sm" style="border:none;background:none;cursor:pointer;margin-bottom:16px" onclick="page='home';render()">← 返回</button>
          
          <div class="card" style="background:${mode==='AA'?'#fef3c7':'#dcfce7'};border-left:6px solid ${mode==='AA'?'#eab308':'#22c55e'}">
            <div style="font-size:24px;font-weight:700">${group.name}</div>
            <p class="text-sm" style="color:#64748b">${members.length}人 · ${mode}</p>
          </div>
          
          <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
              <span style="font-weight:700;font-size:18px">消費紀錄</span>
              <span class="money">NT$ ${total}</span>
            </div>
            ${!bills.length?'<p style="color:#64748b;text-align:center;padding:20px">尚無消費</p>':
            bills.slice().reverse().map(b=>`
              <div class="item" style="cursor:pointer" onclick="editBill('${b.id}')">
                <div style="display:flex;justify-content:space-between">
                  <span>${b.title}</span>
                  <span style="font-weight:700">${b.total}</span>
                </div>
                <p class="text-xs" style="color:#64748b">${b.payerName} 付 · ${new Date(b.created).toLocaleDateString()}</p>
              </div>
            `).join('')}
          </div>
          
          <button class="btn btn-main" onclick="page='add';items=[];title='';amount='';payerId=members[0]?.id;splitMembers=members.map(m=>m.id);servicePercent=0;sharedFee='';discount=0;editBillId=null;render()">＋ 新增消費</button>
          <button class="btn btn-sec mt-2" onclick="page='settlement';render()">📊 結算</button>
        `;
        return;
      }
      
      // ===== 新增消費 - AA模式 =====
      if(page==='add' && mode==='AA'){
        // 計算服務費
        const itemsTotal=items.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
        const serviceFee=Math.round(itemsTotal*(servicePercent/100));
        const grandTotal=itemsTotal+serviceFee+(parseFloat(sharedFee)||0);
        
        app.innerHTML=`
          <button class="text-sm" style="border:none;background:none;cursor:pointer;margin-bottom:16px" onclick="page='group';render()">← 返回</button>
          <h2 class="title">新增消費 - AA</h2>
          
          <label class="label">品項列表</label>
          ${items.map((it,idx)=>`
            <div class="flex gap-2 mb-2" style="align-items:center">
              <input class="input flex-1" placeholder="品項名稱" value="${it.name}" oninput="items[idx].name=this.value;render()" style="margin:0"/>
              <input type="number" class="input" placeholder="0" value="${it.amount}" oninput="items[idx].amount=this.value;render()" style="width:80px;margin:0"/>
              <button class="btn" style="width:40px;padding:8px;background:#fecaca" onclick="items.splice(idx,1);render()">×</button>
            </div>
          `).join('')}
          <button class="btn btn-sec mb-2" onclick="items.push({name:'',amount:''});render()">＋ 加品項</button>
          
          <label class="label">服務費 (%)</label>
          <input type="number" class="input" placeholder="0" value="${servicePercent}" oninput="servicePercent=parseFloat(this.value)||0;render()"/>
          
          <label class="label">額外費用（外送費等）</label>
          <input type="number" class="input" placeholder="0" value="${sharedFee}" oninput="sharedFee=this.value;render()"/>
          
          <div class="card" style="background:#fef9c3">
            <div class="flex" style="justify-content:space-between"><span>品項小計</span><span>NT$ ${itemsTotal}</span></div>
            <div class="flex" style="justify-content:space-between"><span>服務費(${servicePercent}%)</span><span>NT$ ${serviceFee}</span></div>
            <div class="flex" style="justify-content:space-between"><span>額外費用</span><span>NT$ ${parseFloat(sharedFee)||0}</span></div>
            <div class="flex" style="justify-content:space-between;font-weight:700;font-size:18px;margin-top:8px"><span>總計</span><span>NT$ ${grandTotal}</span></div>
          </div>
          
          <label class="label" style="margin-top:16px">誰付錢？</label>
          <div class="flex gap-2" style="flex-wrap:wrap">${members.map(m=>`<span class="tag ${payerId===m.id?'active':''}" onclick="payerId='${m.id}';render()">${m.name}</span>`).join('')}</div>
          
          <label class="label" style="margin-top:16px">誰分攤？</label>
          <div class="flex gap-2" style="flex-wrap:wrap">${members.map(m=>`<span class="tag ${splitMembers.includes(m.id)?'checked':''}" onclick="toggleSplit('${m.id}')">${m.name}</span>`).join('')}</div>
          
          <button class="btn btn-main" style="background:#fbbf24" onclick="saveBillAA()">儲存消費</button>
        `;
        return;
      }
      
      // ===== 新增消費 - AB模式 =====
      if(page==='add' && mode==='AB'){
        const personalSum=Object.values(shares).reduce((s,v)=>s+(parseFloat(v)||0),0);
        const totalBill=parseFloat(amount)||0;
        const shared=parseFloat(sharedFee)||0;
        const disc=parseFloat(discount)||0;
        
        // 計算折扣分配
        let discountPerPerson=0;
        if(discountType==='proportional' && personalSum>0){
          // 按比例
          Object.keys(shares).forEach(mid=>{
            const ratio=(shares[mid]||0)/personalSum;
            shares[mid]=(shares[mid]||0)-disc*ratio;
          });
        }else if(discountType==='average'){
          discountPerPerson=disc/members.length;
        }
        
        const actualTotal=personalSum+shared-disc;
        const diff=totalBill-(actualTotal||0);
        
        app.innerHTML=`
          <button class="text-sm" style="border:none;background:none;cursor:pointer;margin-bottom:16px" onclick="page='group';render()">← 返回</button>
          <h2 class="title">新增消費 - AB</h2>
          
          <label class="label">帳單總額</label>
          <input type="number" class="input" placeholder="0" value="${amount}" oninput="amount=this.value;render()"/>
          
          <label class="label">公共費用（外送費等）</label>
          <input type="number" class="input" placeholder="0" value="${sharedFee}" oninput="sharedFee=this.value;render()"/>
          
          <label class="label">折扣</label>
          <input type="number" class="input" placeholder="0" value="${discount}" oninput="discount=this.value;render()"/>
          <div class="flex gap-2 mb-2">
            <span class="tag ${discountType==='proportional'?'active':''}" onclick="discountType='proportional';render()">按比例</span>
            <span class="tag ${discountType==='average'?'active':''}" onclick="discountType='average';render()">平均</span>
          </div>
          
          <label class="label">個人點餐金額</label>
          ${members.map(m=>`
            <div class="flex gap-2 mb-2" style="align-items:center">
              <span style="flex:1;font-weight:600">${m.name}</span>
              <input type="number" class="input" placeholder="0" value="${shares[m.id]||''}" oninput="shares[m.id]=this.value;render()" style="width:100px;margin:0"/>
            </div>
          `).join('')}
          
          ${amount && personalSum>0?`
            <div class="card" style="background:#fef9c3">
              <div class="flex" style="justify-content:space-between"><span>個人總和</span><span>NT$ ${personalSum}</span></div>
              <div class="flex" style="justify-content:space-between"><span>公共費用</span><span>NT$ ${shared}</span></div>
              <div class="flex" style="justify-content:space-between"><span>折扣</span><span>-NT$ ${disc}</span></div>
              <div class="flex" style="justify-content:space-between"><span>帳單總額</span><span>NT$ ${amount}</span></div>
              ${diff!==0?`
                <div class="diff-alert">
                  <p style="color:#b45309;font-weight:700">⚠️ 差額 NT$ ${Math.abs(diff).toFixed(0)}</p>
                  <button class="btn btn-sec mt-2" onclick="fixDiff()">一鍵修正差額</button>
                </div>
              `:''}
            </div>
          `:''}
          
          <button class="btn btn-main" style="background:#fbbf24" onclick="saveBillAB()">儲存消費</button>
        `;
        return;
      }
      
      // ===== 結算 =====
      if(page==='settlement'){
        // 計算結算
        const balances={};
        members.forEach(m=>balances[m.id]=0);
        
        bills.forEach(b=>{
          if(mode==='AA'){
            const list=b.splitMembers||members.map(m=>m.id);
            const each=b.total/list.length;
            if(b.payerId){
              balances[b.payerId]+=b.total;
              list.forEach(mid=>{if(mid!==b.payerId)balances[mid]-=each;});
            }
          }else{
            if(b.shares){
              Object.entries(b.shares).forEach(([mid,amt])=>{
                balances[mid]=(balances[mid]||0)+amt;
              });
            }
          }
        });
        
        const total=bills.reduce((s,b)=>s+b.total,0);
        
        // 簡化還款路徑
        const debtors=[], creditors=[];
        members.forEach(m=>{
          const bal=balances[m.id]||0;
          if(bal<-0.01)debtors.push({id:m.id,name:m.name,amount:-bal});
          if(bal>0.01)creditors.push({id:m.id,name:m.name,amount:bal});
        });
        
        // 四捨五入校正（差額歸墊錢者）
        const totalBalance=Object.values(balances).reduce((s,v)=>s+v,0);
        const diff=Math.round(totalBalance);
        if(diff!==0 && payerId){
          balances[payerId]=(balances[payerId]||0)+diff;
        }
        
        app.innerHTML=`
          <button class="text-sm" style="border:none;background:none;cursor:pointer;margin-bottom:16px" onclick="page='group';render()">← 返回</button>
          <h2 class="title">結算</h2>
          
          <div class="card" style="text-align:center">
            <p style="color:#64748b">總金額</p>
            <p class="money">NT$ ${total}</p>
          </div>
          
          <div class="card">
            ${members.map(m=>{
              const amt=balances[m.id]||0;
              return `<div style="display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #f1f5f9">
                <span style="font-weight:600">${m.name}</span>
                <span class="${amt>0?'positive':amt<0?'negative':''}">${amt>0?'+':''}${amt.toFixed(0)}</span>
              </div>`;
            })}
          </div>
          
          ${debtors.length && creditors.length?`
            <div class="card">
              <p style="font-weight:700;margin-bottom:12px">還款路徑</p>
              ${debtors.map(d=>{
                let remaining=d.amount;
                return creditors.filter(c=>c.amount>0).map(c=>{
                  if(remaining<=0)return'';
                  const give=Math.min(remaining,c.amount);
                  remaining-=give;
                  c.amount-=give;
                  return `<div style="padding:8px 0;border-bottom:1px dashed #e5e7eb">
                    <span style="font-weight:600">${d.name}</span> 給 <span style="font-weight:600">${c.name}</span> 
                    <span style="color:#22c55e;font-weight:700">NT$ ${give.toFixed(0)}</span>
                  </div>`;
                }).join('');
              }).join('')}
            </div>
          `:''}
          
          <button class="btn btn-danger mt-2" onclick="settle()">💚 一鍵結清</button>
          <button class="btn btn-sec mt-2" onclick="copyResult()">📋 複製結算內容</button>
          <button class="btn btn-sec mt-2" onclick="exportJSON()">💾 匯出資料</button>
        `;
        return;
      }
    }
    
    // ===== 函式 =====
    function addMember(){if(!newMemberName)return;members.push({id:uid(),name:newMemberName});newMemberName='';render();document.getElementById('mname').value='';}
    function removeMember(id){members=members.filter(m=>m.id!==id);render();}
    function toggleSplit(id){splitMembers=splitMembers.includes(id)?splitMembers.filter(x=>x!==id):[...splitMembers,id];render();}
    
    function createGroup(){if(!groupName)return;const g={id:uid(),name:groupName,mode,members,bills:[],created:Date.now(),updated:Date.now()};saveGroup(g);group=g;page='group';render();}
    function openGroup(id){group=getGroup(id);if(!group)return;members=group.members;bills=group.bills;mode=group.mode;page='group';render();}
    
    function saveBillAA(){
      if(!items.length || !payerId)return;
      
      const itemsTotal=items.reduce((s,i)=>s+(parseFloat(i.amount)||0),0);
      const serviceFee=Math.round(itemsTotal*(servicePercent/100));
      const shared=parseFloat(sharedFee)||0;
      const total=itemsTotal+serviceFee+shared;
      
      const bill={
        id:editBillId||uid(),
        title:items.map(i=>i.name).join('、'),
        items:[...items],
        servicePercent,
        sharedFee:shared,
        total,
        payerId,
        payerName:members.find(m=>m.id===payerId)?.name||'?',
        splitMembers:[...splitMembers],
        created:Date.now()
      };
      
      if(editBillId){
        const idx=bills.findIndex(b=>b.id===editBillId);
        if(idx>=0)bills[idx]=bill;
      }else{
        bills.push(bill);
      }
      
      group.bills=bills;group.updated=Date.now();saveGroup(group);
      resetAdd();page='group';render();
    }
    
    function saveBillAB(){
      if(!amount || !payerId)return;
      
      const personalSum=Object.values(shares).reduce((s,v)=>s+(parseFloat(v)||0),0);
      const totalBill=parseFloat(amount);
      const shared=parseFloat(sharedFee)||0;
      const disc=parseFloat(discount)||0;
      
      // 分配折扣
      let finalShares={...shares};
      if(disc>0){
        if(discountType==='proportional' && personalSum>0){
          Object.keys(finalShares).forEach(mid=>{
            const ratio=(finalShares[mid]||0)/personalSum;
            finalShares[mid]=(finalShares[mid]||0)-disc*ratio;
          });
        }else{
          const avg=disc/members.length;
          Object.keys(finalShares).forEach(mid=>{
            finalShares[mid]=(finalShares[mid]||0)-avg;
          });
        }
      }
      
      // 加上公共費用
      const sharedPerPerson=shared/members.length;
      Object.keys(finalShares).forEach(mid=>{
        finalShares[mid]=(finalShares[mid]||0)+sharedPerPerson;
      });
      
      const bill={
        id:editBillId||uid(),
        title:amount, // 顯示總額
        amount:totalBill,
        sharedFee:shared,
        discount,
        discountType,
        total:totalBill,
        payerId,
        payerName:members.find(m=>m.id===payerId)?.name||'?',
        shares:finalShares,
        created:Date.now()
      };
      
      if(editBillId){
        const idx=bills.findIndex(b=>b.id===editBillId);
        if(idx>=0)bills[idx]=bill;
      }else{
        bills.push(bill);
      }
      
      group.bills=bills;group.updated=Date.now();saveGroup(group);
      resetAdd();page='group';render();
    }
    
    function resetAdd(){title='';amount='';payerId='';shares={};sharedFee='';splitMembers=[];servicePercent=0;discount=0;editBillId=null;items=[];}
    
    function editBill(id){
      const bill=bills.find(b=>b.id===id);
      if(!bill)return;
      editBillId=id;
      
      if(mode==='AA'){
        items=bill.items?bill.items.map(i=>({name:i.name,amount:i.amount})):[{name:bill.title,amount:bill.total}];
        servicePercent=bill.servicePercent||0;
        sharedFee=bill.sharedFee||'';
        payerId=bill.payerId;
        splitMembers=bill.splitMembers||members.map(m=>m.id);
      }else{
        amount=bill.amount||'';
        sharedFee=bill.sharedFee||'';
        discount=bill.discount||0;
        discountType=bill.discountType||'proportional';
        payerId=bill.payerId;
        shares=bill.shares||{};
      }
      
      page='add';render();
    }
    
    function fixDiff(){
      const totalBill=parseFloat(amount)||0;
      const personalSum=Object.values(shares).reduce((s,v)=>s+(parseFloat(v)||0),0);
      const shared=parseFloat(sharedFee)||0;
      const disc=parseFloat(discount)||0;
      const diff=totalBill-(personalSum+shared-disc);
      // 差額加到付款人
      shares[payerId]=(shares[payerId]||0)+diff;
      render();
    }
    
    function settle(){
      if(!confirm('確定結清？會清除所有消費紀錄'))return;
      bills=[];
      group.bills=[];group.updated=Date.now();saveGroup(group);
      page='group';render();
    }
    
    function copyResult(){
      const total=bills.reduce((s,b)=>s+b.total,0);
      const balances={};
      members.forEach(m=>balances[m.id]=0);
      
      bills.forEach(b=>{
        if(mode==='AA'){
          const list=b.splitMembers||members.map(m=>m.id);
          const each=b.total/list.length;
          if(b.payerId){balances[b.payerId]+=b.total;list.forEach(mid=>{if(mid!==b.payerId)balances[mid]-=each;});}
        }else{
          if(b.shares)Object.entries(b.shares).forEach(([mid,amt])=>balances[mid]=(balances[mid]||0)+amt);
        }
      });
      
      let text=`🍽️ ${group.name} 結算\n`;
      text+=`總金額：NT$ ${total}\n\n`;
      members.forEach(m=>{
        const amt=balances[m.id]||0;
        if(amt>0)text+=`${m.name} 應付：NT$ ${amt.toFixed(0)}\n`;
        if(amt<0)text+=`${m.name} 應收：NT$ ${Math.abs(amt).toFixed(0)}\n`;
      });
      
      navigator.clipboard.writeText(text);
      alert('✅ 已複製到剪貼簿');
    }
    
    function exportJSON(){
      const data={group:{...group},members,bills};
      const json=JSON.stringify(data,null,2);
      navigator.clipboard.writeText(json);
      alert('✅ JSON 已複製到剪貼簿');
    }
    
    // 初始化
    render();
  </script>
</body>
</html>
