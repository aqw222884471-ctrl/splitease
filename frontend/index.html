<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SplitEase - 晚餐分帳</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { primary: '#6366F1', background: '#F8FAFC' } } } }</script>
</head>
<body class="bg-background min-h-screen">
  <div id="app"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script type="text/babel">
    const{useState,useEffect}=React;
    const API = window.location.hostname === 'localhost' ? '' : '/api';
    const uid=()=>Math.random().toString(36).substr(2,9);
    const code=()=>Math.random().toString(36).substr(2,6).toUpperCase();
    const api={
      c:(n,m,u)=>axios.post(`${API}/api/projects`,{name:n,mode:m,hostName:u}).then(r=>r.data),
      j:(c,u)=>axios.get(`${API}/api/projects/join/${c}`).then(r=>r.data).then(d=>axios.post(`${API}/api/projects/${d.projectId}/participants`,{name:u}).then(p=>{localStorage.setItem('p',d.projectId);localStorage.setItem('u',p.data.participantId);return d;})),
      gp:(id)=>axios.get(`${API}/api/projects/${id}/participants`).then(r=>r.data),
      ge:(id)=>axios.get(`${API}/api/projects/${id}/expenses`).then(r=>r.data),
      ad:(id,df,it)=>axios.post(`${API}/api/projects/${id}/dinner-expenses`,{deliveryFee:df,items:it}).then(r=>r.data),
      gb:(id)=>axios.get(`${API}/api/projects/${id}/balance`).then(r=>r.data),
      st:(id)=>axios.post(`${API}/api/projects/${id}/settle`).then(r=>r.data)
    };
    function Home(){return(<div className="text-center py-8"><h1 className="text-4xl font-bold text-orange-500 mb-2">🍜</h1><h2 className="text-2xl font-bold text-indigo-600 mb-6">SplitEase</h2><button onClick={()=>n('c')} className="block w-full bg-orange-500 text-white py-3 rounded-lg font-bold mb-3">建立新專案</button><button onClick={()=>n('join')} className="block w-full bg-gray-200 py-3 rounded-lg font-bold">加入專案</button><p className="text-gray-400 text-sm mt-8">資料儲存在雲端</p></div>);}
    function Create({done}){const[m,setM]=useState('dinner');const[nm,setNm]=useState('');const[un,setUn]=useState('');const[l,setL]=useState(false);const[ok,setOk]=useState(null);
      const go=async e=>{e.preventDefault();if(!nm||!un)return;setL(true);try{const p=await api.c(nm,m,un);localStorage.setItem('p',p.projectId);localStorage.setItem('u',p.participantId);setOk(p);}catch{alert('錯誤');}setL(false);}
      if(ok)return(<div className="text-center"><h2 className="text-xl font-bold text-green-600 mb-4">✅ 成功</h2><div className="bg-gray-100 p-4 rounded mb-4"><p className="text-gray-500 text-sm">邀請碼</p><p className="text-3xl font-bold">{ok.inviteCode}</p></div><button onClick={()=>n(ok.projectId)} className="block w-full bg-indigo-600 text-white py-3 rounded-lg font-bold">進入 →</button></div>);
      return(<form onSubmit={go}><div className="grid grid-cols-2 gap-2 mb-4"><button type="button" onClick={()=>setM('dinner')} className={`p-4 rounded-xl border-2 ${m==='dinner'?'border-orange-500 bg-orange-50':'border-gray-200'}`}><span className="text-2xl">🍜</span><br/><span className="font-bold">晚餐</span></button><button type="button" onClick={()=>setM('full')} className={`p-4 rounded-xl border-2 ${m==='full'?'border-indigo-500 bg-indigo-50':'border-gray-200'}`}><span className="text-2xl">📊</span><br/><span className="font-bold">完整</span></button></div><input value={nm} onChange={e=>setNm(e.target.value)} placeholder="專案名稱" className="w-full p-3 border rounded mb-3"/><input value={un} onChange={e=>setUn(e.target.value)} placeholder="你的暱稱" className="w-full p-3 border rounded mb-3"/><button disabled={l||!nm||!un} className="block w-full bg-orange-500 text-white py-3 rounded-lg font-bold">{l?'處理中':'建立專案'}</button></form>);}
    function Join(){const[c,setC]=useState('');const[u,setU]=useState('');const[l,setL]=useState(false);
      const go=async e=>{e.preventDefault();if(!c||!u)return;setL(true);try{await api.j(c.toUpperCase(),u);n(localStorage.getItem('p'));}catch{alert('邀請碼錯誤');}setL(false);}
      return(<form onSubmit={go}><input value={c} onChange={e=>setC(e.target.value.toUpperCase())} placeholder="輸入6位數邀請碼" className="w-full p-3 border rounded mb-3 text-center text-xl tracking-widest"/><input value={u} onChange={e=>setU(e.target.value)} placeholder="你的暱稱" className="w-full p-3 border rounded mb-3"/><button disabled={l} className="block w-full bg-indigo-600 text-white py-3 rounded-lg font-bold">{l?'處理中':'加入'}</button></form>);}
    function Dashboard(){const[pts,setPts]=useState([]);const[exs,setExs]=useState([]);const[bal,setBal]=useState(null);const[l,setL]=useState(true);const pid=localStorage.getItem('p');const uid=localStorage.getItem('u');
      useEffect(()=>{if(pid){api.gp(pid).then(setPts);api.ge(pid).then(setExs);api.gb(pid).then(r=>{setBal(r);setL(false);}).catch(()=>setL(false));}},[pid]);
      const owe=bal?.balances?.find(x=>x.participantId===uid)?.balance||0;
      return(<div>{l?<div className="text-center py-8">載入中...</div>:<div><div className="bg-orange-500 text-white p-4 rounded mb-4"><p className="text-sm opacity-80">你的欠款</p><p className="text-3xl font-bold">NT$ {owe}</p></div><div className="flex gap-2 mb-4"><button onClick={()=>n(pid+'/d')} className="flex-1 bg-orange-500 text-white py-3 rounded font-bold">🍜 新增點單</button><button onClick={()=>n(pid+'/b')} className="flex-1 bg-gray-200 py-3 rounded font-bold">📋 欠款</button></div><div className="bg-white p-4 rounded shadow"><h3 className="font-bold text-gray-600 mb-2">點單記錄</h3>{exs.length===0?<p className="text-gray-400 text-center py-4">尚無記錄</p>:exs.map(e=><div key={e.expenseId} className="border-b py-2"><p className="text-sm text-gray-500">{new Date(e.createdAt).toLocaleString()}</p><p className="font-bold">NT$ {e.items?.reduce((s,i)=>s+i.totalOwed,0)||0}</p></div>)}</div></div>}</div>);}
    function AddDinner(){const[pts,setPts]=useState([]);const[df,setDf]=useState('');const[its,setIts]={};const[l,setL]=useState(false);const pid=localStorage.getItem('p');
      useEffect(()=>{if(pid){api.gp(pid).then(p=>{setPts(p);p.forEach(x=>its[x.participantId]='');setIts({...its});});}},[pid]);
      const go=async e=>{e.preventDefault();const arr=Object.entries(its).filter(([k,v])=>v).map(([k,v])=>({participantId:k,amount:parseFloat(v)||0})).filter(x=>x.amount>0);
        if(arr.length===0)return alert('請輸入金額');setL(true);
        try{await api.ad(pid,df,arr);alert('✅ 已記錄');n(pid);}catch{alert('錯誤');}setL(false);}
      const per=(parseFloat(df)||0)/(pts.length||1);
      return(<form onSubmit={go}><div className="bg-white p-4 rounded mb-4"><label className="block font-bold mb-2">🚴 外送費（均分）</label><input type="number" value={df} onChange={e=>setDf(e.target.value)} className="w-full p-3 border rounded"/><p className="text-sm text-gray-500 mt-1">NT$ {per}/人</p></div><div className="bg-white p-4 rounded mb-4"><label className="block font-bold mb-2">🍽️ 點餐金額</label>{pts.map(p=><div key={p.participantId} className="flex items-center mb-3"><span className="flex-1 font-medium">{p.name} {p.isHost&&'👑'}</span><input type="number" value={its[p.participantId]} onChange={e=>{its[p.participantId]=e.target.value;setIts({...its});}} className="w-28 p-2 border rounded text-right" placeholder="0"/></div>)}</div><button disabled={l} className="block w-full bg-orange-500 text-white py-3 rounded-lg font-bold">{l?'儲存中':'✅ 確認記錄'}</button></form>);}
    function Balance(){const[bal,setBal]=useState(null);const[l,setL]=useState(true);const uid=localStorage.getItem('u');const pid=localStorage.getItem('p');
      useEffect(()=>{if(pid){api.gb(pid).then(r=>{setBal(r);setL(false);});}},[pid]);
      const go=async()=>{if(!confirm('確定結清？會清除所有記錄'))return;setL(true);try{await api.st(pid);alert('✅ 已結清');n(pid);}catch{alert('錯誤');}setL(false);}
      if(l)return(<div className="text-center py-8">載入中...</div>);
      const host=bal?.balances?.find(x=>x.isHost);const mems=bal?.balances?.filter(x=>!x.isHost)||[];
      return(<div><div className="bg-orange-50 p-4 rounded mb-4"><p className="text-orange-600 text-sm">累積總消費</p><p className="text-2xl font-bold text-orange-600">NT$ {bal?.totalExpenses||0}</p></div><div className="bg-white p-4 rounded mb-4">{host&&<div className="flex justify-between py-2 border-b"><span className="font-medium">{host.name} 👑</span><span className="text-green-600">+NT$ {host.totalOwed}</span></div>}{mems.map(m=><div key={m.participantId} className={`flex justify-between py-2 ${m.balance>0?'bg-red-50 -mx-2 px-2 rounded':''}`}><span className={m.participantId===uid?'text-orange-600 font-bold':''}>{m.name} {m.participantId===uid&&'(你)'}</span><span className={m.balance>0?'text-red-600':'text-gray-400'}>NT$ {m.balance>0?'-':''}{Math.abs(m.balance)}</span></div>)}</div><button onClick={go} className="block w-full bg-green-500 text-white py-3 rounded-lg font-bold">💚 一鍵結清</button></div>);}
    let cur='';const n=(p)=>{cur=p;r();};
    function App(){const pid=localStorage.getItem('p');if(!pid&&!cur)return<Home/>;if(cur==='c')return<Create done={n}/>;if(cur==='join')return<Join/>;if(cur&&!cur.startsWith('/'))return<Dashboard/>;if(cur){const id=cur.split('/')[0];if(cur.includes('/d'))return<AddDinner/>;if(cur.includes('/b'))return<Balance/>;return<Dashboard/>;}return<Home/>;}
    function r(){ReactDOM.render(<App/>,document.getElementById('app'));}r();
  </script>
</body>
</html>
