<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SplitEase - 晚餐分帳</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">
  <div id="app" class="max-w-md mx-auto p-4">
    <h1 class="text-3xl font-bold text-center text-indigo-600 mb-6">🍜 SplitEase</h1>
    <div id="content"></div>
  </div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script type="text/babel">
    const {useState, useEffect} = React;
    const API = '';
    const api = {
      create: (n,m,u) => axios.post(`${API}/api/projects`,{name:n,mode:m,hostName:u}).then(r=>r.data),
      join: (c) => axios.get(`${API}/api/projects/join/${c}`).then(r=>r.data),
      addPart: (id,n) => axios.post(`${API}/api/projects/${id}/participants`,{name:n}).then(r=>r.data),
      getParts: (id) => axios.get(`${API}/api/projects/${id}/participants`).then(r=>r.data),
      addDinner: (id,d,i) => axios.post(`${API}/api/projects/${id}/dinner-expenses`,{deliveryFee:d,items:i}).then(r=>r.data),
      getExp: (id) => axios.get(`${API}/api/projects/${id}/expenses`).then(r=>r.data),
      getBal: (id) => axios.get(`${API}/api/projects/${id}/balance`).then(r=>r.data),
      settle: (id) => axios.post(`${API}/api/projects/${id}/settle`).then(r=>r.data)
    };
    function Home() {
      return (
        <div className="text-center">
          <h2 className="text-2xl font-bold mb-4">🍜 簡單分帳</h2>
          <button onClick={()=>n('create')} className="bg-orange-500 text-white px-6 py-3 rounded-lg w-full mb-3 font-bold">建立新專案</button>
          <button onClick={()=>n('join')} className="bg-gray-200 text-gray-700 px-6 py-3 rounded-lg w-full font-bold">加入專案</button>
        </div>
      );
    }
    function Create({done}) {
      const [m,setM] = useState('dinner');
      const [nm,setNm] = useState('');
      const [un,setUn] = useState('');
      const [load,setLoad] = useState(false);
      const [ok,setOk] = useState(null);
      const go = async e => {
        e.preventDefault();
        if(!nm||!un) return;
        setLoad(true);
        try {
          const p = await api.create(nm,m,un);
          localStorage.setItem('p',p.projectId);
          localStorage.setItem('u',p.participantId);
          setOk(p);
        } catch{x=>alert('錯誤')}
        setLoad(false);
      }
      if(ok) return <div className="text-center"><h2 className="text-xl font-bold text-green-600 mb-4">✅ OK!</h2><p className="text-gray-500 mb-2">{ok.inviteCode}</p><button onClick={()=>n(p.projectId)} className="bg-indigo-600 text-white px-6 py-3 rounded-lg w-full">進入 →</button></div>
      return (
        <form onSubmit={go}>
          <div className="grid grid-cols-2 gap-2 mb-4">
            <button type="button" onClick={()=>setM('dinner')} className={`p-3 rounded border-2 ${m==='dinner'?'border-orange-500 bg-orange-50':'border-gray-200'}`}>🍜 晚餐</button>
            <button type="button" onClick={()=>setM('full')} className={`p-3 rounded border-2 ${m==='full'?'border-indigo-500 bg-indigo-50':'border-gray-200'}`}>📊 完整</button>
          </div>
          <input value={nm} onChange={e=>setNm(e.target.value)} placeholder="專案名" className="w-full p-3 border rounded mb-3"/>
          <input value={un} onChange={e=>setUn(e.target.value)} placeholder="你的名" className="w-full p-3 border rounded mb-3"/>
          <button type="submit" disabled={load||!nm||!un} className="bg-orange-500 text-white px-6 py-3 rounded-lg w-full font-bold">{load?'處理中':'建立'}</button>
        </form>
      );
    }
    function Join() {
      const [code,setC] = useState('');
      const [un,setU] = useState('');
      const [load,setL] = useState(false);
      const go = async e => {
        e.preventDefault();
        if(!code||!un) return;
        setL(true);
        try {
          const p = await api.join(code.toUpperCase());
          const u = await api.addPart(p.projectId,un);
          localStorage.setItem('p',p.projectId);
          localStorage.setItem('u',u.participantId);
          n(p.projectId);
        } catch{alert('錯誤')}
        setL(false);
      }
      return (
        <form onSubmit={go}>
          <input value={code} onChange={e=>setC(e.target.value.toUpperCase())} placeholder="邀請碼" className="w-full p-3 border rounded mb-3 text-center text-xl"/>
          <input value={un} onChange={e=>setU(e.target.value)} placeholder="你的名" className="w-full p-3 border rounded mb-3"/>
          <button disabled={load} className="bg-indigo-600 text-white px-6 py-3 rounded-lg w-full font-bold">{load?'處理中':'加入'}</button>
        </form>
      );
    }
    function Dashboard({id}) {
      const [p,setP] = useState(null);
      const [ps,setPs] = useState([]);
      const [ex,setEx] = useState([]);
      const [bal,setBal] = useState(null);
      const [load,setL] = useState(true);
      const uid = localStorage.getItem('u');
      useEffect(()=>{api.getParts(id).then(setPs);api.getExp(id).then(setEx);
        if(p?.mode==='dinner')api.getBal(id).then(setBal).finally(()=>setL(false));
        else setL(false);
      },[id,p]);
      const owe = bal?.balances.find(b=>b.participantId===uid)?.balance||0;
      if(load) return <div className="text-center py-8">載入中...</div>;
      return (
        <div>
          <div className="bg-orange-500 text-white p-4 rounded mb-4">
            <p className="text-sm opacity-80">你的欠款</p>
            <p className="text-3xl font-bold">NT$ {owe}</p>
          </div>
          <div className="flex gap-2 mb-4">
            <button onClick={()=>n(id+'/d')} className="flex-1 bg-orange-500 text-white py-3 rounded font-bold">🍜 新增</button>
            <button onClick={()=>n(id+'/b')} className="flex-1 bg-gray-200 py-3 rounded font-bold">📋 欠款</button>
          </div>
          <div className="bg-white p-4 rounded shadow">
             <h3 className="font-bold mb-2">點單記錄</h3>
             {ex.length===0&&<p className="text-gray-400">尚無記錄</p>}
             {ex.map(e=><div key={e.expenseId} className="border-b py-2">
                <p className="text-sm text-gray-500">{new Date(e.createdAt).toLocaleString()}</p>
                <p className="font-bold">NT$ {e.items.reduce((s,i)=>s+i.totalOwed,0)}</p>
             </div>)}
          </div>
        </div>
      );
    }
    function AddDinner({id}) {
      const [ps,setPs] = useState([]);
      const [df,setDf]=useState('');
      const [its,setIts]={};
      const [load,setL]=useState(false);
      useEffect(()=>api.getParts(id).then(d=>{setPs(d);d.forEach(p=>its[p.participantId]='');setIts({...its})}),[id]);
      const go = async e=>{
        e.preventDefault();
        const arr = Object.entries(its).filter(([k,v])=>v).map(([k,v])=>({participantId:k,amount:parseFloat(v)||0})).filter(x=>x.amount>0);
        if(arr.length===0) return alert('请输入金额');
        setL(true);
        try {
          await api.addDinner(id,parseFloat(df)||0,arr);
          alert('✅ OK');
          n(id);
        } catch{alert('錯誤')}
        setL(false);
      }
      const per = (parseFloat(df)||0)/(ps.length||1);
      return (
        <form onSubmit={go}>
          <div className="bg-white p-4 rounded mb-4">
            <label className="block font-bold mb-2">🚴 外送費</label>
            <input type="number" value={df} onChange={e=>setDf(e.target.value)} className="w-full p-2 border rounded"/>
            <p className="text-sm text-gray-500">均分 NT$ {per}/人</p>
          </div>
          <div className="bg-white p-4 rounded mb-4">
            <label className="block font-bold mb-2">🍽️ 點餐</label>
            {ps.map(p=><div key={p.participantId} className="flex items-center mb-2">
              <span className="flex-1">{p.name} {p.isHost&&'👑'}</span>
              <input type="number" value={its[p.participantId]} onChange={e=>{setIts({...its,[p.participantId]:e.target.value});setIts({...its})}} className="w-24 p-2 border rounded text-right" placeholder="0"/>
            </div>)}
          </div>
          <button disabled={load} className="bg-orange-500 text-white py-3 rounded-lg w-full font-bold">{load?'儲存中':'✅ 確認'}</button>
        </form>
      );
    }
    function Balance({id}) {
      const [bal,setB]=useState(null);
      const [load,setL]=useState(true);
      const uid = localStorage.getItem('u');
      useEffect(()=>api.getBal(id).then(setB).finally(()=>setL(false)),[id]);
      const settle=async()=>{if(!confirm('確定結清？'))return;setL(true);await api.settle(id);alert('✅');n(id);}
      if(load)return<div className="text-center py-8">...</div>;
      const host=bal.balances.find(b=>b.isHost);
      const mems=bal.balances.filter(b=>!b.isHost);
      return (
        <div>
          <div className="bg-orange-50 p-4 rounded mb-4">
            <p className="text-orange-600">總消費</p>
            <p className="text-2xl font-bold text-orange-600">NT$ {bal.totalExpenses}</p>
          </div>
          <div className="bg-white p-4 rounded mb-4">
            {host&&<div className="flex justify-between py-2 border-b"><span>{host.name} 👑</span><span className="text-green-600">+NT$ {host.totalOwed}</span></div>}
            {mems.map(m=><div key={m.participantId} className={`flex justify-between py-2 ${m.balance>0?'bg-red-50 -mx-2 px-2 rounded':''}`}>
              <span className={m.participantId===uid?'text-orange-600 font-bold':''}>{m.name} {m.participantId===uid&&'(你)'}</span>
              <span className={m.balance>0?'text-red-600':'text-gray-400'}>NT$ {m.balance>0?'-':''}{Math.abs(m.balance)}</span>
            </div>)}
          </div>
          <button onClick={settle} className="bg-green-500 text-white py-3 rounded-lg w-full font-bold">💚 一鍵結清</button>
        </div>
      );
    }
    let cur = '';
    function n(p) {cur=p;r();}
    function App() {
      const pid = localStorage.getItem('p');
      if(!pid&&!cur) return <Home/>;
      if(cur==='create') return <Create done={n}/>;
      if(cur==='join') return <Join/>;
      if(cur&&!cur.startsWith('/')) return <Dashboard id={cur}/>;
      if(cur) {
        const id = cur.split('/')[0];
        if(cur.includes('/d')) return <AddDinner id={id}/>;
        if(cur.includes('/b')) return <Balance id={id}/>;
        return <Dashboard id={id}/>;
      }
      return <Home/>;
    }
    function r(){ReactDOM.render(<App/>,document.getElementById('content'));}
    r();
  </script>
</body>
</html>
